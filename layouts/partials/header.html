<header class="fixed-nav">
    <div class="container flex justify-between items-center">
        <!-- Brand Section -->
        <a href="{{ "/" | relURL }}" class="nav-brand" style="display: flex; flex-direction: column; gap: 4px;">
             <div class="flex items-center gap-3">
                 <div style="background: var(--color-accent); width: 40px; height: 40px; border-radius: 8px; display: flex; align-items: center; justify-content: center; color: white; font-size: 1.25rem;">🕊️</div>
                 <h1 style="font-size: 1.75rem; margin: 0; font-weight: 800;">{{ .Site.Title }}</h1>
             </div>
             <span style="font-size: 0.75rem; text-transform: uppercase; letter-spacing: 0.25em; opacity: 0.5; font-weight: 800; margin-left: 52px;">Planetary Synchronicity Hub</span>
        </a>
        
        <!-- Navigation Section (Desktop only) -->
        <nav class="nav-links">
            <a href="{{ "upcoming" | relURL }}" style="font-weight: 800; opacity: 1; color: var(--color-text);">Upcoming</a>
            <a href="{{ "archive" | relURL }}" style="font-weight: 800; opacity: 1; color: var(--color-text);">Archive</a>
            <a href="{{ "impact" | relURL }}" style="font-weight: 800; opacity: 1; color: var(--color-text);">Impact</a>
            <a href="{{ "community" | relURL }}" style="font-weight: 800; opacity: 1; color: var(--color-text);">Community</a>
        </nav>

        <!-- Dynamic Controls -->
        <div class="flex items-center gap-8">
            <div id="dual-clock" style="font-size: 1rem; font-weight: 800; letter-spacing: -0.01em; border-right: 1.5px solid var(--color-border); padding-right: 2rem; white-space: nowrap;">
                <span id="clocks-combined">00:00 IST | 00:00 UTC</span>
            </div>
            <button id="theme-toggle" title="Toggle Mode" style="margin: 0;">
                <svg id="theme-icon" fill="none" viewBox="0 0 24 24"></svg>
            </button>
            <!-- Hamburger (mobile only, shown via CSS) -->
            <button class="hamburger-btn" onclick="document.getElementById('mobile-nav').classList.add('active')" aria-label="Open menu">
                <svg fill="none" viewBox="0 0 24 24" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M3.75 6.75h16.5M3.75 12h16.5m-16.5 5.25h16.5"/></svg>
            </button>
        </div>
    </div>
</header>

<!-- Mobile Navigation Overlay -->
<div id="mobile-nav" class="mobile-nav-overlay">
    <button class="mobile-nav-close" onclick="document.getElementById('mobile-nav').classList.remove('active')" aria-label="Close menu">&times;</button>
    <a href="{{ "/" | relURL }}" onclick="document.getElementById('mobile-nav').classList.remove('active')">Home</a>
    <a href="{{ "upcoming" | relURL }}" onclick="document.getElementById('mobile-nav').classList.remove('active')">Upcoming</a>
    <a href="{{ "archive" | relURL }}" onclick="document.getElementById('mobile-nav').classList.remove('active')">Archive</a>
    <a href="{{ "impact" | relURL }}" onclick="document.getElementById('mobile-nav').classList.remove('active')">Impact</a>
    <a href="{{ "community" | relURL }}" onclick="document.getElementById('mobile-nav').classList.remove('active')">Community</a>
    <!-- Theme toggle for small screens (hidden by default, shown via CSS at ≤390px) -->
    <button class="menu-theme-toggle" onclick="document.getElementById('theme-toggle').click()" title="Toggle Mode">
        <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="5"/><path d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"/></svg>
    </button>
</div>
