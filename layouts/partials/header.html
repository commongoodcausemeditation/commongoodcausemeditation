<header class="fixed-nav">
    <div class="container flex justify-between items-center">
        <!-- Brand Section -->
        <a href="{{ "/" | relURL }}" class="nav-brand" style="display: flex; flex-direction: column; gap: 4px;">
             <div class="flex items-center gap-3">
                 <div style="background: var(--color-accent); width: 30px; height: 30px; border-radius: 8px; display: flex; align-items: center; justify-content: center; color: white; font-size: 1rem;">🕊️</div>
                 <h1 style="font-size: 1.5rem; margin: 0; font-weight: 800;">{{ .Site.Title }}</h1>
             </div>
             <span style="font-size: 0.65rem; text-transform: uppercase; letter-spacing: 0.25em; opacity: 0.5; font-weight: 800; margin-left: 42px;">Planetary Synchronicity Hub</span>
        </a>
        
        <!-- Navigation Section (Enhanced Visibility) -->
        <nav class="nav-links">
            <a href="{{ "upcoming" | relURL }}" style="font-weight: 800; opacity: 1; color: var(--color-text);">Upcoming</a>
            <a href="{{ "archive" | relURL }}" style="font-weight: 800; opacity: 1; color: var(--color-text);">Archive</a>
            <a href="{{ "impact" | relURL }}" style="font-weight: 800; opacity: 1; color: var(--color-text);">Impact</a>
            <a href="{{ "community" | relURL }}" style="font-weight: 800; opacity: 1; color: var(--color-text);">Community</a>
        </nav>

        <!-- Dynamic Controls (Side-by-Side) -->
        <div class="flex items-center gap-8">
            <div id="dual-clock" style="font-size: 0.85rem; font-weight: 800; letter-spacing: -0.01em; border-right: 1.5px solid var(--color-border); padding-right: 2rem; white-space: nowrap;">
                <span id="clocks-combined">00:00 IST | 00:00 UTC</span>
            </div>
            <button id="theme-toggle" title="Toggle Mode" style="margin: 0;">
                <svg id="theme-icon" fill="none" viewBox="0 0 24 24"></svg>
            </button>
        </div>
    </div>
</header>
