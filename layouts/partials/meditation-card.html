<div class="glass-card flex flex-col h-full hover:border-[var(--color-accent)] transition-all group">
    <div class="flex justify-between mb-4">
        <span class="text-3xl group-hover:scale-110 transition-transform">{{ .Params.icon }}</span>
        <span class="text-xs uppercase opacity-40 font-bold tracking-widest">{{ .Params.category }}</span>
    </div>
    <h3 class="text-xl font-serif mb-2" style="font-size: 1.35rem;">{{ .Title }}</h3>
    <p class="text-sm opacity-60 flex-1 mb-4 leading-relaxed">{{ .Params.description }}</p>
    <div class="pt-4 border-t border-[var(--color-border)] flex items-center justify-between" style="margin-top: auto;">
        <div class="flex flex-col text-left">
            <span class="text-xs uppercase opacity-40 font-bold">Time</span>
            <span data-utc-time="{{ .Params.utc_time }}" class="text-sm font-bold text-[var(--color-accent)]">--:-- | --:-- UTC</span>
        </div>
        <div style="display: flex; align-items: center; gap: 0.6rem;">
            <button onclick="startMeditation('{{ .Params.id }}', '{{ .Title }}', '{{ .Params.icon }}', '{{ .Params.description }}', '{{ .Params.utc_time }}')" class="btn-primary transition-transform hover:scale-105" style="padding: 0.5rem 1.25rem; font-size: 0.8rem; font-weight: 700; border-radius: 99px; cursor: pointer; border: none; font-family: inherit; height: 38px; display: flex; align-items: center; justify-content: center;">Join Space</button>
            <button onclick="window.addToCalendar('{{ .Title }}', '{{ .Params.description }}', '{{ .Params.utc_time }}')" class="hover:scale-110 transition-transform opacity-70 hover:opacity-100" style="width: 38px; height: 38px; display: flex; align-items: center; justify-content: center; border-radius: 50%; background: var(--color-surface); border: 1.5px solid var(--color-border); font-size: 0.95rem; cursor: pointer;" title="Add to Calendar" aria-label="Add to Calendar">📅</button>
        </div>
    </div>
</div>
